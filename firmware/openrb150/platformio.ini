; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; The target hardware is a ROBOTIS OpenRB-150 (Microchip SAMD21G18A,
; Cortex-M0+ @ 48 MHz, 256 KB flash, 32 KB SRAM). PlatformIO ships no
; OpenRB-150 board package, so this project provides one:
;
;   boards/openrb150.json          -> custom board definition ([env:openrb150])
;   variants/OpenRB-150/variant.*  -> exact OpenRB-150 pin map (from ROBOTIS)
;
; The custom variant restores the OpenRB-150 peripheral mapping that the stock
; `mkrzero` board gets wrong. With [env:openrb150] you get the REAL hardware
; mapping:
;   - Serial1 -> internal DYNAMIXEL TTL bus (SERCOM2, pins 26/27)
;   - Serial2 -> external 4-pin UART connector (SERCOM4, pins 28/29)  [CRSF/ELRS]
;   - Serial3 -> expansion UART header (SERCOM5, pins 13/14)
;   - BDPIN_DXL_PWR_EN (31) -> DYNAMIXEL power FET enable
;   - PIN_LED / LED_BUILTIN (32), ADC_BATTERY (33)
;
; Use [env:openrb150] for all real firmware work. The [env:mkrzero] env is kept
; only as a fallback "does the toolchain work?" check; do NOT rely on its serial
; mapping. See doc/mkrzero-vs-openrb150.md for the full rationale.

[platformio]
default_envs = openrb150

[env]
platform = atmelsam
framework = arduino
monitor_speed = 115200
lib_deps =
    robotis-git/Dynamixel2Arduino@^0.8.1

; Primary environment: custom OpenRB-150 board + variant (correct pin mapping).
[env:openrb150]
board = openrb150
board_build.variants_dir = variants

; Fallback environment: stock MKR Zero. Same MCU/upload flow, but WRONG serial
; and DXL-power pin mapping. Compile/upload smoke tests only.
[env:mkrzero]
board = mkrzero
